spring.application.name=audit-service
server.port=8084

# Base de données
spring.datasource.url=jdbc:postgresql://localhost:5432/bankcore_db
spring.datasource.username=bankcore
spring.datasource.password=bankcore
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
	
# Kafka — Consumer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=audit-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Logs
logging.level.ma.bankcore=DEBUG
logging.level.org.springframework.kafka=INFO

# Compatibilité Spring Cloud
spring.cloud.compatibility-verifier.enabled=false

#auto-offset-reset=earliest
#→ Si l'audit-service démarre après que des messages ont été publiés
#→ Il lit depuis le DÉBUT du topic (pas les manquer)
#→ alternative : latest (ignore les anciens messages)

#trusted.packages=*
#→ Jackson peut désérialiser n'importe quel package
#→ Nécessaire pour nos DTOs (ma.bankcore.audit_service.dto)*#